<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Modern Portfolio</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

/* ===== MAIN BACKGROUND ===== */
body {
  min-height: 100vh;
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* Royal blue blurry glow */
body::before,
body::after {
  content: "";
  position: absolute;
  width: 420px;
  height: 420px;
  background: radial-gradient(
    circle,
    rgba(30, 80, 255, 0.55),
    rgba(30, 80, 255, 0)
  );
  filter: blur(100px);
  z-index: -1;
}

body::before {
  top: -140px;
  left: -140px;
}

body::after {
  bottom: -140px;
  right: -140px;
}

/* Subtle premium noise */
html::after {
  content: "";
  position: fixed;
  inset: 0;
  background-image: radial-gradient(rgba(0,0,0,0.035) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none;
}

/* ===== GLASS CARD ===== */
.profile-card {
  width: 360px;
  padding: 28px;
  border-radius: 22px;
  background: rgba(255, 255, 255, 0.45);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.6);
  box-shadow: 0 30px 80px rgba(0, 0, 0, 0.15);
  text-align: center;
}

/* Profile Image */
.profile-img {
  width: 110px;
  height: 110px;
  margin: 0 auto 18px;
  border-radius: 50%;
  overflow: hidden;
  border: 3px solid rgba(255, 255, 255, 0.8);
}

.profile-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Name & Role */
.profile-card h1 {
  font-size: 22px;
  font-weight: 600;
  color: #111;
}

.profile-card p.role {
  font-size: 14px;
  color: #333;
  margin-top: 6px;
}

/* Divider */
.divider {
  width: 98%;
  height: 1px;
  background: rgba(0,0,0,0.12);
  margin: 18px auto;
}

/* Skills */
.skills {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}

.skill {
  padding: 6px 12px;
  font-size: 12px;
  border-radius: 999px;
  background: rgba(255,255,255,0.7);
  border: 1px solid #dadada;
}

/* Bio */
.bio {
  font-size: 13px;
  color: #222;
  margin: 16px 0 20px;
  line-height: 1.6;
}

/* Links */
.links {
  display: flex;
  gap: 12px;
  justify-content: center;
}

.links a {
  text-decoration: none;
  font-size: 13px;
  padding: 10px 16px;
  border-radius: 10px;
  background: #0b2fff;
  color: #fff;
  transition: all 0.3s ease;
}

.links a:hover {
  background: #071ecf;
  transform: translateY(-2px);
}

/* Responsive */
@media (max-width: 420px) {
  .profile-card {
    width: 90%;
  }
}
</style>
</head>

<body>

<div class="profile-card">

  <!-- Profile Image -->
  <div class="profile-img">
    <img src="https://www.upwork.com/profile-portraits/c11mixHHPIjh4IGmLyPbZnnva_FgCYSRIsDNqiV_ObtkGTTIuPnC_YO7zrC8JmWEhR" alt="Profile">
  </div>

  <!-- Name -->
  <h1>Anees A.</h1>
  <p class="role">Shopify Expert | Shopify Developer | Shopify UI & UX</p>

  <div class="divider"></div>

  <!-- Skills -->
  <div class="skills">
    <span class="skill">Shopify</span>
    <span class="skill">Liquid</span>
    <span class="skill">Figma</span>
    <span class="skill">UI/UX</span>
    <span class="skill">Shopify Development</span>
  </div>

  <!-- Bio -->
  <p class="bio">
    I design and build modern, high-converting Shopify websites with clean visuals,
    smooth animations, and a strong focus on user experience.
  </p>

  <!-- Links -->
  <div class="links">
    <a href="https://www.upwork.com/freelancers/~0192da72842aae71a3">Portfolio</a>
    <a href="https://api.whatsapp.com/send/?phone=923215006742&text&type=phone_number&app_absent=0">Contact</a>
  </div>

</div>

</body>
</html>
